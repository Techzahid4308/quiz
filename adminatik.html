<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#080d18;
--surface:#0d1526;
--surface2:#111d35;
--border:rgba(59,130,246,.15);
--accent:#3b82f6;
--text:#e2e8f0;
--text-dim:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Syne',sans-serif;
background:var(--bg);
color:var(--text);
padding:30px 18px;
}

.container{
max-width:950px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:18px;
font-weight:700;
letter-spacing:.1em;
}

.status{
font-size:12px;
background:#10203d;
padding:6px 14px;
border-radius:20px;
border:1px solid var(--border);
color:#34d399;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.stat{
background:var(--surface);
border:1px solid var(--border);
padding:16px;
border-radius:12px;
}

.stat-label{
font-size:11px;
color:var(--text-dim);
margin-bottom:6px;
letter-spacing:.1em;
}

.stat-value{
font-size:24px;
font-family:'JetBrains Mono',monospace;
}

.table-card{
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
overflow:hidden;
}

.table-header{
padding:14px 18px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:var(--surface2);
}

th,td{
padding:12px 18px;
text-align:left;
font-size:13px;
}

th{
font-size:10px;
letter-spacing:.14em;
text-transform:uppercase;
color:var(--text-dim);
}

tbody tr:hover{
background:rgba(59,130,246,.06);
}

.answer-cell{
font-weight:600;
color:var(--text);
}

.time-cell{
color:var(--text-dim);
font-size:12px;
}

.map-link{
font-size:11px;
text-decoration:none;
padding:5px 10px;
border-radius:6px;
background:rgba(59,130,246,.1);
border:1px solid rgba(59,130,246,.3);
color:#60a5fa;
}

.copy-btn{
font-size:11px;
padding:5px 10px;
border-radius:6px;
border:1px solid rgba(148,163,184,.3);
background:rgba(148,163,184,.08);
color:var(--text-dim);
cursor:pointer;
}

.copy-btn:hover{
background:rgba(148,163,184,.2);
}

.empty{
text-align:center;
padding:40px;
color:var(--text-dim);
}

</style>
</head>

<body>

<div class="container">

<header>
<div class="logo">ADMIN DASHBOARD</div>
<div class="status">● LIVE</div>
</header>

<div class="stats">
<div class="stat">
<div class="stat-label">TOTAL ENTRIES</div>
<div class="stat-value" id="stat-total">—</div>
</div>

<div class="stat">
<div class="stat-label">LAST UPDATED</div>
<div class="stat-value" id="stat-time" style="font-size:15px">—</div>
</div>
</div>

<div class="table-card">

<div class="table-header">
<div>Visitor Records</div>
<div id="count-badge">Loading...</div>
</div>

<table>

<thead>
<tr>
<th>Answer</th>
<th>Timestamp</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyD-myAkBLFbPyqIomR02q6iftboysae-wQ",
authDomain:"locationxdd.firebaseapp.com",
databaseURL:"https://locationxdd-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"locationxdd",
storageBucket:"locationxdd.firebasestorage.app",
messagingSenderId:"114480292043",
appId:"1:114480292043:web:d143429c68784b0706bb4e"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const tbody=document.getElementById("tbody");
const badge=document.getElementById("count-badge");
const statTotal=document.getElementById("stat-total");
const statTime=document.getElementById("stat-time");

onValue(ref(db,"visitors"),snapshot=>{

tbody.innerHTML="";

if(!snapshot.exists()){
tbody.innerHTML=`<tr><td colspan="3" class="empty">No records yet</td></tr>`;
return;
}

let rows=[];

snapshot.forEach(child=>{
rows.push(child.val());
});

rows.reverse(); // NEWEST → OLDEST

let total=rows.length;

rows.forEach(d=>{

let hasCoords=d?.lat&&d?.lng;

let tr=document.createElement("tr");

tr.innerHTML=`
<td class="answer-cell">${d?.answer ?? "—"}</td>
<td class="time-cell">${d?.time_bst_friendly ?? new Date(d?.timestamp||0).toLocaleString()}</td>
<td>

<div style="display:flex;gap:8px;flex-wrap:wrap">

${hasCoords?`
<a class="map-link" target="_blank"
href="https://www.google.com/maps?q=${d.lat},${d.lng}">
Map
</a>

<button class="copy-btn"
data-lat="${d.lat}"
data-lng="${d.lng}">
Copy
</button>
`:`—`}

</div>

</td>
`;

tbody.appendChild(tr);

});

badge.textContent=total+" records";
statTotal.textContent=total;

statTime.textContent=new Date().toLocaleTimeString();

});

document.addEventListener("click",e=>{

if(e.target.classList.contains("copy-btn")){

let lat=e.target.dataset.lat;
let lng=e.target.dataset.lng;

navigator.clipboard.writeText(lat+","+lng);

e.target.textContent="Copied";

setTimeout(()=>{
e.target.textContent="Copy";
},1200);

}

});

</script>

</body>
</html>
